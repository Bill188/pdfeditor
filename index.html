<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Editor</title>
  <meta name="description" content="A powerful browser-based PDF editor. Add text, draw, highlight, and more." />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PDF Editor" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <!-- PDF.js for rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- pdf-lib for editing -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <!-- Font-kit for embedding fonts -->
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2427402565567238" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Welcome / Drop Zone (shown when no PDF is loaded) -->
  <div id="welcome-screen" class="welcome-screen">
    <div class="drop-zone" id="drop-zone">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
      <h1>PDF Editor</h1>
      <p>Drag &amp; drop a PDF file here, or click to browse</p>
      <button class="btn btn-primary" id="browse-btn">Browse Files</button>
      <input type="file" id="file-input" accept=".pdf" hidden />
    </div>

    <!-- Ad: Welcome Screen Banner -->
    <div class="ad-slot ad-welcome" id="ad-welcome">
      <!-- PASTE YOUR ADSENSE AD UNIT CODE HERE -->
      <!-- Example:
      <ins class="adsbygoogle"
           style="display:inline-block;width:728px;height:90px"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="XXXXXXXXXX"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
      <div class="ad-placeholder">Advertisement</div>
    </div>
  </div>

  <!-- Main Editor (shown when a PDF is loaded) -->
  <div id="editor-screen" class="editor-screen hidden">

    <!-- Top Toolbar -->
    <header class="toolbar" id="toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-open" title="Open PDF">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Open</span>
        </button>
        <button class="toolbar-btn" id="btn-save" title="Save PDF">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Save</span>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Tools -->
      <div class="toolbar-group tools-group">
        <button class="toolbar-btn active" id="tool-select" title="Select / Pan" data-tool="select">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
          <span>Select</span>
        </button>
        <button class="toolbar-btn" id="tool-text" title="Add Text" data-tool="text">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          <span>Text</span>
        </button>
        <button class="toolbar-btn" id="tool-draw" title="Draw / Freehand" data-tool="draw">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          <span>Draw</span>
        </button>
        <button class="toolbar-btn" id="tool-highlight" title="Highlight" data-tool="highlight">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="6" rx="1" fill="#fde047" opacity="0.5"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="3" y1="18" x2="15" y2="18"/></svg>
          <span>Highlight</span>
        </button>
        <button class="toolbar-btn" id="tool-rect" title="Rectangle" data-tool="rect">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          <span>Rect</span>
        </button>
        <button class="toolbar-btn" id="tool-image" title="Add Image" data-tool="image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Image</span>
        </button>
        <button class="toolbar-btn" id="tool-whiteout" title="Whiteout / Redact" data-tool="whiteout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" fill="white" stroke="currentColor"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
          <span>Whiteout</span>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Tool Options (dynamic) -->
      <div class="toolbar-group" id="tool-options">
        <label class="toolbar-label">Color:</label>
        <input type="color" id="opt-color" value="#000000" class="color-picker" />
        <label class="toolbar-label">Size:</label>
        <input type="range" id="opt-size" min="1" max="48" value="16" class="size-slider" />
        <span id="opt-size-val" class="size-val">16</span>
        <label class="toolbar-label" id="opt-font-label">Font:</label>
        <select id="opt-font" class="toolbar-select">
          <option value="Helvetica">Helvetica</option>
          <option value="Times-Roman">Times Roman</option>
          <option value="Courier">Courier</option>
        </select>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Page Actions -->
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-rotate-left" title="Rotate Page Left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-rotate-right" title="Rotate Page Right">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-delete-page" title="Delete Page">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-add-page" title="Add Blank Page">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Zoom & Navigation -->
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-zoom-out" title="Zoom Out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <span id="zoom-level" class="zoom-level">100%</span>
        <button class="toolbar-btn" id="btn-zoom-in" title="Zoom In">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-fit" title="Fit to Width">Fit</button>
      </div>

      <div class="toolbar-spacer"></div>

      <!-- Undo / Redo -->
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-undo" title="Undo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          <span>Undo</span>
        </button>
        <button class="toolbar-btn" id="btn-redo" title="Redo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
          <span>Redo</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-content">

      <!-- Page Thumbnails Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3>Pages</h3>
          <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
        </div>
        <div class="thumbnails" id="thumbnails"></div>
      </aside>

      <!-- Canvas Area -->
      <div class="canvas-area" id="canvas-area">
        <div class="canvas-container" id="canvas-container">
          <div class="canvas-wrapper" id="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <canvas id="annotation-canvas"></canvas>
          </div>
        </div>

        <!-- Page Navigation -->
        <div class="page-nav">
          <button class="nav-btn" id="btn-prev-page" title="Previous Page">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="page-info">
            Page <input type="number" id="page-input" min="1" value="1" /> of <span id="page-count">0</span>
          </span>
          <button class="nav-btn" id="btn-next-page" title="Next Page">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
          </button>
        </div>
      </div>

      <!-- Properties Panel -->
      <aside class="properties-panel hidden" id="properties-panel">
        <h3>Properties</h3>
        <div id="properties-content"></div>
      </aside>
    </div>

    <!-- Ad: Editor Bottom Banner -->
    <div class="ad-slot ad-bottom-banner" id="ad-bottom-banner">
      <!-- PASTE YOUR ADSENSE AD UNIT CODE HERE -->
      <!-- Example:
      <ins class="adsbygoogle"
           style="display:inline-block;width:728px;height:90px"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="XXXXXXXXXX"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
      <div class="ad-placeholder">Advertisement</div>
    </div>

  </div>

  <!-- Text Input Modal -->
  <div class="modal hidden" id="text-modal">
    <div class="modal-content">
      <h3>Add Text</h3>
      <textarea id="text-input" placeholder="Enter text..." rows="4"></textarea>
      <div class="modal-actions">
        <button class="btn" id="text-cancel">Cancel</button>
        <button class="btn btn-primary" id="text-confirm">Add</button>
      </div>
    </div>
  </div>

  <!-- Merge PDF modal -->
  <div class="modal hidden" id="merge-modal">
    <div class="modal-content">
      <h3>Merge PDF</h3>
      <p>Select additional PDF files to merge with the current document.</p>
      <input type="file" id="merge-input" accept=".pdf" multiple />
      <div class="modal-actions">
        <button class="btn" id="merge-cancel">Cancel</button>
        <button class="btn btn-primary" id="merge-confirm">Merge</button>
      </div>
    </div>
  </div>

  <!-- Ad: Save Interstitial -->
  <div class="modal hidden" id="ad-interstitial">
    <div class="modal-content ad-interstitial-content">
      <div class="ad-interstitial-header">
        <span>Your file is being prepared...</span>
        <span class="ad-countdown" id="ad-countdown">5</span>
      </div>
      <div class="ad-slot ad-interstitial-slot" id="ad-interstitial-slot">
        <!-- PASTE YOUR ADSENSE AD UNIT CODE HERE -->
        <!-- Example:
        <ins class="adsbygoogle"
             style="display:inline-block;width:336px;height:280px"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        -->
        <div class="ad-placeholder ad-placeholder-lg">Advertisement</div>
      </div>
      <button class="btn btn-primary ad-skip-btn hidden" id="ad-skip-btn">Continue to Download</button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
